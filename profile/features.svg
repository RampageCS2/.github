<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 310" role="img" aria-label="Unikalios sistemos: Skinai, Misijos, Rangai, Ekonomika, Klanai, VIP. Rampage projekte rasi visas žaidėjų pamėgtas sistemas ir daug naujų populiarų sistemų!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19ee19" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#19ee19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card surface -->
  <rect width="1200" height="310" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="180" cy="155" r="280" fill="url(#glowCyan)"/>
  <circle cx="1020" cy="155" r="280" fill="url(#glowCyan)"/>
  <circle cx="600" cy="155" r="360" fill="url(#glowGreen)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="309" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line)"/>

  <!-- Section label (bigger) -->
  <text x="600" y="55" text-anchor="middle"
        font-family="'Roboto',Arial,sans-serif"
        font-size="22" font-weight="700" fill="#0dcaf0" letter-spacing="3">UNIKALIOS SISTEMOS</text>

  <!-- Slogan (regular white, not muted) -->
  <text x="600" y="90" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="15" font-weight="400" fill="#ffffff" opacity="0.90">Rampage projekte rasi visas žaidėjų pamėgtas sistemas ir daug naujų populiarų sistemų!</text>

  <!-- Divider -->
  <rect x="120" y="110" width="960" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- 6 features, 2 cols × 3 rows. Col x=140, x=640 (each 440 wide, gap 40). -->
  <g font-family="'Roboto','Segoe UI',Arial,sans-serif">
    <!-- Row 1 y=135 -->
    <g transform="translate(140, 135)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">SKINAI</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Inventoriaus · Dėžių atidarinėjimas · Žaidėjų turgus · Mainų sistema</text>
    </g>
    <g transform="translate(640, 135)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">MISIJOS</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Kasdienės · Savaitinės · Mėnesinės · Dideli atlygiai</text>
    </g>
    <!-- Row 2 y=190 -->
    <g transform="translate(140, 190)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">RANGAI</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Lygiai · Detali statistika</text>
    </g>
    <g transform="translate(640, 190)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">EKONOMIKA</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Skinai · Ruletė · Coinflip · Klanai</text>
    </g>
    <!-- Row 3 y=245 -->
    <g transform="translate(140, 245)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">KLANAI</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Topai · Karai</text>
    </g>
    <g transform="translate(640, 245)">
      <circle cx="14" cy="20" r="8" fill="#0dcaf0"/>
      <circle cx="14" cy="20" r="14" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="42" y="18" font-size="18" font-weight="700" fill="#ffffff">VIP</text>
      <text x="42" y="38" font-size="12" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="0.4">Unikalūs privalumai</text>
    </g>
  </g>
</svg>
