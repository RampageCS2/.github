<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Unikalios sistemos: Skinai, Misijos, Rangai, Ekonomika, Klanai, VIP. Rampage projekte rasi visas žaidėjų pamėgtas sistemas ir daug naujų populiarų sistemų!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19ee19" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#19ee19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card surface -->
  <rect width="1200" height="520" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="180" cy="260" r="360" fill="url(#glowCyan)"/>
  <circle cx="1020" cy="260" r="360" fill="url(#glowCyan)"/>
  <circle cx="600" cy="260" r="420" fill="url(#glowGreen)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="519" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line)"/>

  <!-- Section label (bigger) -->
  <text x="600" y="60" text-anchor="middle"
        font-family="'Roboto',Arial,sans-serif"
        font-size="32" font-weight="700" fill="#0dcaf0" letter-spacing="3">UNIKALIOS SISTEMOS</text>

  <!-- Slogan (regular white, not muted) -->
  <text x="600" y="98" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="20" font-weight="400" fill="#ffffff" opacity="0.90">Rampage.lt projekte rasi visas žaidėjų pamėgtas sistemas ir daug naujų populiarų sistemų!</text>

  <!-- Divider -->
  <rect x="120" y="120" width="960" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- 6 features, single column at x=100. Row spacing 60. -->
  <g font-family="'Roboto','Segoe UI',Arial,sans-serif">
    <g transform="translate(100, 150)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">SKINAI</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Inventorius · Dėžių atidarinėjimas · Žaidėjų turgus · Mainų sistema</text>
    </g>
    <g transform="translate(100, 210)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">MISIJOS</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Kasdienės · Savaitinės · Mėnesinės · Dideli atlygiai</text>
    </g>
    <g transform="translate(100, 270)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">RANGAI</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Lygiai · Detali statistika</text>
    </g>
    <g transform="translate(100, 330)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">EKONOMIKA</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Skinai · Ruletė · Coinflip · Klanai</text>
    </g>
    <g transform="translate(100, 390)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">KLANAI</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Topai · Karai</text>
    </g>
    <g transform="translate(100, 450)">
      <circle cx="16" cy="24" r="10" fill="#0dcaf0"/>
      <circle cx="16" cy="24" r="17" fill="none" stroke="#0dcaf0" stroke-opacity="0.25"/>
      <text x="48" y="22" font-size="24" font-weight="700" fill="#ffffff">VIP</text>
      <text x="48" y="48" font-size="16" font-weight="400" fill="#ffffff" opacity="0.70" letter-spacing="0.3">Unikalūs privalumai</text>
    </g>
  </g>
</svg>

