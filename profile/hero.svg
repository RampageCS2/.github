<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 310" role="img" aria-label="Rampage.lt — Geriausi Lietuviški CS2 serveriai! Netiki? Užsuk ir įsitikinsi! 10 serverių, unikali skinų sistema, didelė ir smagi bendruomenė.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19ee19" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#19ee19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="310" rx="24" ry="24" fill="url(#bg)"/>

  <circle cx="200" cy="155" r="280" fill="url(#glowCyan)"/>
  <circle cx="1000" cy="155" r="280" fill="url(#glowCyan)"/>
  <circle cx="600" cy="155" r="340" fill="url(#glowGreen)"/>

  <rect x="0.5" y="0.5" width="1199" height="309" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <rect x="0" y="0" width="1200" height="3" fill="url(#line)"/>

  <!-- Title -->
  <text x="600" y="115" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="104" font-weight="900" fill="#ffffff" letter-spacing="6">RAMPAGE.LT</text>

  <!-- Divider -->
  <rect x="500" y="143" width="200" height="2" fill="url(#line)"/>

  <!-- Main tagline: bold assertion -->
  <text x="600" y="185" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="28" font-weight="500" fill="#ffffff" opacity="0.92">Geriausi Lietuviški CS2 serveriai!</text>

  <!-- Sub-tagline: invitation — regular white -->
  <text x="600" y="220" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="20" font-weight="400" fill="#ffffff" opacity="0.90">Netiki? Užsuk ir įsitikinsi!</text>

  <!-- Positioning pill row: 3 pills. Widths 180 + 280 + 340, gaps 20. Total = 840. Start x = 180 -->
  <g transform="translate(180, 268)" font-family="'Roboto',Arial,sans-serif" font-size="14" font-weight="700" fill="#0dcaf0" letter-spacing="1.5">
    <g>
      <rect x="0" y="-18" width="180" height="36" rx="18"
            fill="#0dcaf0" fill-opacity="0.10" stroke="#0dcaf0" stroke-opacity="0.35"/>
      <text x="90" y="5" text-anchor="middle">10 SERVERIŲ</text>
    </g>
    <g transform="translate(200, 0)">
      <rect x="0" y="-18" width="280" height="36" rx="18"
            fill="#0dcaf0" fill-opacity="0.10" stroke="#0dcaf0" stroke-opacity="0.35"/>
      <text x="140" y="5" text-anchor="middle">UNIKALI SKINŲ SISTEMA</text>
    </g>
    <g transform="translate(500, 0)">
      <rect x="0" y="-18" width="340" height="36" rx="18"
            fill="#0dcaf0" fill-opacity="0.10" stroke="#0dcaf0" stroke-opacity="0.35"/>
      <text x="170" y="5" text-anchor="middle">DIDELĖ IR SMAGI BENDRUOMENĖ</text>
    </g>
  </g>
</svg>

