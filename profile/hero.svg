<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Rampage.lt — Didžiausias Lietuvos CS2 bendruomenės serverių tinklas. 11 CS2 serverių, 2,7K+ žaidėjų, 2K+ bendruomenės narių.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19ee19" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#19ee19" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card surface -->
  <rect width="1200" height="340" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="200" cy="170" r="300" fill="url(#glowCyan)"/>
  <circle cx="1000" cy="170" r="300" fill="url(#glowCyan)"/>
  <circle cx="600" cy="170" r="360" fill="url(#glowGreen)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="339" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line)"/>

  <!-- Title -->
  <text x="600" y="90" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="80" font-weight="900" fill="#ffffff" letter-spacing="6">RAMPAGE.LT</text>

  <!-- Divider -->
  <rect x="500" y="115" width="200" height="2" fill="url(#line)"/>

  <!-- Tagline -->
  <text x="600" y="150" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="22" font-weight="400" fill="#ffffff" opacity="0.85">Didžiausias Lietuvoje CS2 bendruomenės serverių tinklas</text>

  <!-- 3 stat cards centered. Card 200×100, gap 30. Total = 3·200 + 2·30 = 660. Start x = (1200-660)/2 = 270. -->
  <g font-family="'Roboto','Segoe UI',Arial,sans-serif">
    <g transform="translate(270, 185)">
      <rect width="200" height="100" rx="16"
            fill="#0dcaf0" fill-opacity="0.06" stroke="#0dcaf0" stroke-opacity="0.28"/>
      <text x="100" y="58" text-anchor="middle" font-size="44" font-weight="900" fill="#ffffff">11</text>
      <text x="100" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#0dcaf0" letter-spacing="2.5">CS2 SERVERIŲ</text>
    </g>
    <g transform="translate(500, 185)">
      <rect width="200" height="100" rx="16"
            fill="#0dcaf0" fill-opacity="0.06" stroke="#0dcaf0" stroke-opacity="0.28"/>
      <text x="100" y="58" text-anchor="middle" font-size="44" font-weight="900" fill="#ffffff">2.7K+</text>
      <text x="100" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#0dcaf0" letter-spacing="2.5">ŽAIDĖJŲ</text>
    </g>
    <g transform="translate(730, 185)">
      <rect width="200" height="100" rx="16"
            fill="#0dcaf0" fill-opacity="0.06" stroke="#0dcaf0" stroke-opacity="0.28"/>
      <text x="100" y="58" text-anchor="middle" font-size="44" font-weight="900" fill="#ffffff">2K+</text>
      <text x="100" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#0dcaf0" letter-spacing="2.5">BENDRUOMENĖS NARIŲ</text>
    </g>
  </g>
</svg>

