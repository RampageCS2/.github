<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Serveriai: Public, Mix, Retakes, AWP, Deagle, 1v1 Arenos, Surf GunXP, Public [Custom]. Turime visokiausių tipų serverių — nuobodu tikrai nebus!">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1621"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0dcaf0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0dcaf0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0dcaf0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card surface -->
  <rect width="1200" height="280" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="180" cy="140" r="260" fill="url(#glowCyan)"/>
  <circle cx="1020" cy="140" r="260" fill="url(#glowCyan)"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="279" rx="24" ry="24"
        fill="none" stroke="#0dcaf0" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#line)"/>

  <!-- Section label (bigger) -->
  <text x="600" y="55" text-anchor="middle"
        font-family="'Roboto',Arial,sans-serif"
        font-size="22" font-weight="700" fill="#0dcaf0" letter-spacing="3">SERVERIAI</text>

  <!-- Slogan (regular white, not muted) -->
  <text x="600" y="90" text-anchor="middle"
        font-family="'Roboto','Segoe UI',Arial,sans-serif"
        font-size="15" font-weight="400" fill="#ffffff" opacity="0.90">Turime visokiausių tipų serverių — nuobodu tikrai nebus!</text>

  <!-- Divider -->
  <rect x="120" y="110" width="960" height="1" fill="url(#line)" opacity="0.6"/>

  <!-- 8 pills, 4 per row. Order from user's list: Public, Mix, Retakes, AWP | Deagle, 1v1 Arenos, Surf GunXP, Public [Custom] -->
  <g font-family="'Roboto',Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff" letter-spacing="2">
    <!-- Row 1 y=135 -->
    <g transform="translate(140, 135)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">PUBLIC</text>
    </g>
    <g transform="translate(375, 135)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">MIX</text>
    </g>
    <g transform="translate(610, 135)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">RETAKES</text>
    </g>
    <g transform="translate(845, 135)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">AWP</text>
    </g>
    <!-- Row 2 y=195 -->
    <g transform="translate(140, 195)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">DEAGLE</text>
    </g>
    <g transform="translate(375, 195)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">1V1 ARENOS</text>
    </g>
    <g transform="translate(610, 195)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">SURF GUNXP</text>
    </g>
    <g transform="translate(845, 195)">
      <rect width="215" height="44" rx="22" fill="#0dcaf0" fill-opacity="0.08" stroke="#0dcaf0" stroke-opacity="0.30"/>
      <text x="107.5" y="28" text-anchor="middle">PUBLIC [CUSTOM]</text>
    </g>
  </g>
</svg>
